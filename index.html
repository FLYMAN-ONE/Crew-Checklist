<!doctype html>
<html lang="it" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>SCCM PREFLIGHT CHECKLIST V11.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════
   THEME TOKENS
═══════════════════════════ */
:root{
  --bg:#0F172A; --bg2:#162032; --bg3:#1C2D40; --bg4:#243448;
  --border:#2A3F58; --border2:#344F6A;
  --lbl:#94A3B8; --val:#F1F5F9; --txt:#CBD5E1; --dim:#4A6080;
  --shadow:none; --input-bg:#0B1625; --modal-bg:#162032;
  --accent:#38BDF8; --green:#22C55E; --orange:#FF8C00; --red:#F97066;
  --done-bg:#052010; --done-br:#0A3A1A;
  --iss-bg:#130C00; --iss-br:#4A3000;
  --custom-bg:#162030; --ext-bg:#1C2D40; --rp-bg:#1C2D40;
}
[data-theme="light"]{
  --bg:#F8FAFC; --bg2:#FFFFFF; --bg3:#FFFFFF; --bg4:#F1F5F9;
  --border:#E2E8F0; --border2:#CBD5E1;
  --lbl:#64748B; --val:#1E293B; --txt:#334155; --dim:#94A3B8;
  --shadow:0 1px 4px rgba(0,0,0,.08); --input-bg:#F8FAFC; --modal-bg:#FFFFFF;
  --accent:#0284C7; --green:#16A34A; --orange:#EA6C00; --red:#DC2626;
  --done-bg:#F0FDF4; --done-br:#86EFAC;
  --iss-bg:#FFF7ED; --iss-br:#FED7AA;
  --custom-bg:#EFF6FF; --ext-bg:#F8FAFC; --rp-bg:#F8FAFC;
}

/* ═══════════════════════════
   RESET & BASE
═══════════════════════════ */
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;overflow:hidden;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:var(--bg);color:var(--val);text-transform:uppercase;
  -webkit-font-smoothing:antialiased;transition:background .2s,color .2s;}

/* ═══════════════════════════
   ANIMATIONS
═══════════════════════════ */
@keyframes glow-done{0%{box-shadow:0 0 0 0 rgba(34,197,94,.75);}40%{box-shadow:0 0 0 14px rgba(34,197,94,0);}100%{box-shadow:none;}}
@keyframes iss-pulse{0%{box-shadow:0 0 0 0 rgba(255,140,0,.75);}60%{box-shadow:0 0 0 10px rgba(255,140,0,0);}100%{box-shadow:none;}}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
@keyframes squircle-pulse{0%,100%{box-shadow:0 4px 20px rgba(56,189,248,.25);}50%{box-shadow:0 4px 28px rgba(56,189,248,.5);}}
@keyframes squircle-pulse-lp{0%,100%{box-shadow:0 0 0 0 rgba(249,112,102,.4);}50%{box-shadow:0 0 0 8px rgba(249,112,102,0);}}
.anim-done{animation:glow-done .5s ease-out forwards;}
.anim-iss {animation:iss-pulse .4s ease-out forwards;}

/* ═══════════════════════════
   OVERLAYS / MODALS
═══════════════════════════ */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);
    z-index:9000;align-items:center;justify-content:center;}
.ov.open{display:flex;}
.mbox{background:var(--modal-bg);border:1px solid var(--border2);border-radius:18px;
      padding:26px 22px;max-width:390px;width:92%;text-align:center;animation:fadein .18s ease;
      box-shadow:0 8px 40px rgba(0,0,0,.3);}
.mmsg{font-size:14px;line-height:1.7;color:var(--txt);margin-bottom:20px;}
.mbtns{display:flex;gap:10px;}
.mbtns button{flex:1;padding:13px;border-radius:11px;border:none;font-size:13px;font-weight:700;
  font-family:inherit;cursor:pointer;touch-action:manipulation;letter-spacing:.4px;}
.mb-ok{background:var(--accent);color:#fff;}
.mb-cancel{background:var(--bg4);color:var(--lbl);}
#inp-title{font-size:11px;letter-spacing:3px;color:var(--accent);margin-bottom:12px;text-align:left;}
#inp-ta{width:100%;background:var(--input-bg);color:var(--val);border:1.5px solid var(--border);
  border-radius:10px;padding:11px 13px;font-size:14px;font-weight:600;font-family:inherit;
  min-height:56px;resize:vertical;text-transform:uppercase;}
#inp-ta:focus{outline:none;border-color:var(--accent);}
#inp-btns{display:flex;gap:10px;margin-top:14px;}

/* ═══════════════════════════
   SCREENS
═══════════════════════════ */
.screen{display:none;width:100vw;height:100vh;}
.screen.active{display:flex;}

/* ═══════════════════════════════════════
   SETUP SCREEN
═══════════════════════════════════════ */
#screen-setup{
  flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);padding:24px;overflow-y:auto;position:relative;
}
/* theme toggle — top right */
.su-theme-btn{
  position:absolute;top:18px;right:20px;
  border:none;border-radius:8px;width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg4);border:1px solid var(--border);
  cursor:pointer;touch-action:manipulation;transition:background .12s;
}
.su-theme-btn:hover{background:var(--bg3);}
.su-theme-btn svg{width:18px;height:18px;display:block;}

/* title block */
.su-title{font-size:22px;font-weight:900;letter-spacing:5px;margin:0 0 6px;text-align:center;color:var(--val);}
.su-ver{font-size:10px;letter-spacing:2px;color:var(--lbl);opacity:.7;margin:0 0 24px;text-align:center;font-weight:500;}

/* card */
.su-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;
         padding:24px 26px;width:100%;max-width:520px;box-shadow:var(--shadow);}
.su-sect{font-size:11px;font-weight:700;letter-spacing:4px;color:var(--accent);
         margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.su-sect::after{content:'';flex:1;height:1px;background:var(--border);}
.su-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fld label{font-size:13px;font-weight:700;letter-spacing:1.5px;color:var(--val);display:block;margin-bottom:6px;}
.fld input,.fld select{
  width:100%;background:var(--input-bg);color:var(--val);border:1.5px solid var(--border);
  border-radius:11px;padding:13px 14px;font-size:16px;font-weight:700;font-family:inherit;
  letter-spacing:1px;-webkit-appearance:none;transition:border-color .18s,box-shadow .18s;}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(56,189,248,.1);}
.fld input.ok{border-color:var(--green);}
.fld select.ok{border-color:var(--green);}
.fld select option{background:var(--input-bg);}
.fld-hint{font-size:10px;font-weight:500;letter-spacing:1px;color:var(--dim);margin-top:4px;}
.su-div{height:1px;background:var(--border);margin:18px 0;}
#btn-avvia{width:100%;padding:15px;border:none;border-radius:12px;font-size:14px;font-weight:800;
  letter-spacing:3px;background:var(--accent);color:#fff;cursor:pointer;touch-action:manipulation;
  font-family:inherit;transition:opacity .18s,box-shadow .18s;}
#btn-avvia:disabled{opacity:.18;cursor:not-allowed;}
#btn-avvia:not(:disabled){box-shadow:0 0 26px rgba(56,189,248,.22);}

/* ═══════════════════════════════════════
   CHECKLIST SCREEN
═══════════════════════════════════════ */
#screen-checklist{flex-direction:column;height:100vh;overflow:hidden;}
#cl-header{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);}

/* ── HEADER ROW 1 — auto-width cells, content-fit ── */
#hdr-r1{
  display:flex;
  align-items:stretch;
  border-bottom:1px solid var(--border);
  min-height:60px;
  overflow-x:auto;       /* landscape: allow scroll if very narrow */
}

/* Data group — scrollable strip of flight-info cells */
.hdr-data-group{
  display:flex;align-items:stretch;
  flex:1;overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.hdr-data-group::-webkit-scrollbar{display:none;}

/* Each data block — auto-width, shrink to content */
.hb{
  flex:0 0 auto;
  display:flex;flex-direction:column;justify-content:center;
  padding:7px 14px;
  border-right:1px solid var(--border);
  white-space:nowrap;
}
.hb:last-child{border-right:none;}
.hb-lbl{font-size:13px;font-weight:600;letter-spacing:1.5px;color:var(--lbl);margin-bottom:2px;}
.hb-val{font-size:24px;font-weight:800;color:var(--val);white-space:nowrap;line-height:1.1;}

/* Clock block — tap zone, auto-width */
.hclock{
  flex:0 0 auto;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px 14px;border-right:1px solid var(--border);
  cursor:pointer;touch-action:manipulation;
  -webkit-user-select:none;user-select:none;
  transition:background .12s;white-space:nowrap;
}
.hclock:hover{background:var(--bg3);}
.hclock-top{display:flex;align-items:center;gap:5px;height:18px;margin-bottom:2px;}
.hclock-lbl{font-size:13px;font-weight:600;letter-spacing:1.5px;color:var(--lbl);line-height:1;}
.hclock-mode{font-size:9px;font-weight:800;letter-spacing:1.5px;line-height:1;
  padding:2px 5px;border-radius:4px;min-width:32px;text-align:center;}
.hclock-mode.utc{background:rgba(56,189,248,.15);color:var(--accent);}
.hclock-mode.loc{background:rgba(255,140,0,.15);color:var(--orange);}
.hclock-digits{font-size:22px;font-weight:900;letter-spacing:2px;color:var(--val);
  font-variant-numeric:tabular-nums;white-space:nowrap;line-height:1;}

/* Issues block — auto-width */
.h-iss{
  flex:0 0 auto;
  display:flex;flex-direction:column;justify-content:center;
  padding:7px 14px;border-right:1px solid var(--border);white-space:nowrap;
}
.h-iss-lbl{font-size:13px;font-weight:600;letter-spacing:1.5px;color:var(--lbl);margin-bottom:2px;}
.h-iss-val{font-size:24px;font-weight:900;line-height:1.1;white-space:nowrap;}
.h-iss-val.ok  {color:var(--green);}
.h-iss-val.warn{color:var(--orange);}

/* ETD diff — auto-width, conditional */
.h-etd{display:none;flex:0 0 auto;flex-direction:column;justify-content:center;
  padding:7px 14px;border-right:1px solid var(--border);white-space:nowrap;}
.h-etd.show{display:flex;}
.h-etd-lbl{font-size:13px;font-weight:600;letter-spacing:1.5px;color:var(--lbl);margin-bottom:2px;}
.h-etd-val{font-size:22px;font-weight:900;line-height:1.1;white-space:nowrap;font-variant-numeric:tabular-nums;}
.h-etd-val.ahead{color:var(--green);}
.h-etd-val.late {color:var(--red);}

/* Controls — anchored right, shrink-proof */
.hdr-ctrl{
  display:flex;align-items:center;gap:6px;
  padding:0 12px;flex-shrink:0;
  border-left:1px solid var(--border);
  margin-left:auto;  /* push to right when data group doesn't fill */
}
.hbtn{border:none;border-radius:8px;padding:8px 12px;font-size:10px;font-weight:800;
  letter-spacing:1.5px;cursor:pointer;touch-action:manipulation;white-space:nowrap;font-family:inherit;}
.hbtn-mod{background:var(--bg4);color:var(--lbl);border:1px solid var(--border);}
.theme-btn{
  border:none;border-radius:8px;width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg4);border:1px solid var(--border);
  cursor:pointer;touch-action:manipulation;transition:background .12s;flex-shrink:0;padding:0;
}
.theme-btn:hover{background:var(--bg3);}
.theme-btn svg{width:17px;height:17px;display:block;}

/* Long-press RESET — 2s */
#btn-reset{
  border:none;border-radius:8px;padding:8px 12px;font-size:10px;font-weight:800;
  letter-spacing:1.5px;cursor:pointer;touch-action:manipulation;white-space:nowrap;
  font-family:inherit;background:rgba(249,112,102,.1);color:var(--red);
  border:1px solid rgba(249,112,102,.22);
  position:relative;overflow:hidden;-webkit-user-select:none;user-select:none;
}
.lp-bar{position:absolute;left:0;bottom:0;height:3px;width:0%;
  background:var(--red);border-radius:0 0 8px 8px;pointer-events:none;}
#btn-reset.pressing .lp-bar{width:100%;transition:width 2s linear;}

/* ── PORTRAIT — max 2 rows, no overlaps ── */
@media (orientation:portrait){
  #hdr-r1{
    flex-wrap:wrap;
    overflow-x:visible;
  }
  /* Row 1: clock + scrollable data strip */
  .hclock{
    flex:0 0 auto;
    border-bottom:1px solid var(--border);
  }
  .hdr-data-group{
    flex:1;
    border-bottom:1px solid var(--border);
    overflow-x:auto;
  }
  .h-iss{
    border-bottom:1px solid var(--border);
    /* stays inside the scrollable data group */
  }
  .h-etd{
    border-bottom:1px solid var(--border);
  }
  /* Row 2: controls full width */
  .hdr-ctrl{
    flex:0 0 100%;
    border-left:none;
    border-top:0;
    margin-left:0;
    padding:7px 12px;
    justify-content:flex-end;
    background:var(--bg2);
  }
  /* Slightly smaller font in portrait to fit more */
  .hb-val,.hclock-digits,.h-iss-val,.h-etd-val{font-size:19px;}
  .hb-lbl,.hclock-lbl,.h-iss-lbl,.h-etd-lbl{font-size:11px;}
  .hclock-digits{font-size:19px;letter-spacing:1.5px;}
}

/* Phase tabs */
#hdr-r2{display:flex;align-items:stretch;height:38px;overflow-x:auto;}
.ptab{flex:1;min-width:68px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:3px 5px;cursor:pointer;touch-action:manipulation;border-right:1px solid var(--border);
  position:relative;transition:background .15s;-webkit-user-select:none;user-select:none;}
.ptab:last-child{border-right:none;}
.ptab:hover{background:var(--bg3);}
.ptab.active{background:var(--bg4);}
.ptab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--green));}
.ptab.riep.active::after{background:linear-gradient(90deg,var(--orange),var(--red));}
.ptab-n{font-size:9px;font-weight:700;letter-spacing:.7px;color:var(--dim);text-align:center;line-height:1.2;}
.ptab.active .ptab-n{color:var(--accent);}
.ptab.riep.active .ptab-n{color:var(--orange);}
.ptab-sub{font-size:8px;color:var(--dim);margin-top:1px;}
.ptab.active .ptab-sub{color:var(--green);}
.ptab-bar{width:65%;height:2px;background:var(--border);border-radius:999px;overflow:hidden;margin-top:2px;}
.ptab-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .3s;}

/* ═══════════════════════════════════════
   BOARDING SUB-HEADER
═══════════════════════════════════════ */
#boarding-bar{display:none;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);
  padding:8px 16px;align-items:center;gap:14px;}
#boarding-bar.show{display:flex;}
.bw-timer{font-size:22px;font-weight:900;letter-spacing:3px;font-variant-numeric:tabular-nums;white-space:nowrap;min-width:80px;}
.bw-timer.idle   {color:var(--dim);}
.bw-timer.running{color:var(--green);}
.bw-timer.done   {color:var(--accent);}
#btn-bw{border:none;border-radius:10px;padding:10px 18px;font-size:12px;font-weight:800;
  letter-spacing:1.5px;cursor:pointer;touch-action:manipulation;font-family:inherit;
  transition:background .15s,box-shadow .15s;flex-shrink:0;}
#btn-bw.idle   {background:var(--bg4);color:var(--lbl);border:1px solid var(--border);}
#btn-bw.running{background:var(--red);color:#fff;box-shadow:0 0 12px rgba(249,112,102,.3);}
#btn-bw.stopped{background:var(--bg4);color:var(--green);border:1px solid var(--border);}
.bw-cells{display:flex;gap:14px;flex:1;}
.bw-cell{display:flex;flex-direction:column;}
.bw-c-lbl{font-size:9px;letter-spacing:2px;color:var(--dim);margin-bottom:2px;}
.bw-c-val{font-size:14px;font-weight:700;color:var(--lbl);}
.bw-c-val.ok{color:var(--green);}

/* ═══════════════════════════════════════
   BODY AREA
═══════════════════════════════════════ */
#cl-body{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#ph-hdr{flex-shrink:0;padding:6px 16px 5px;display:flex;align-items:baseline;gap:10px;
  border-bottom:1px solid var(--border);}
.ph-title{font-size:14px;font-weight:800;letter-spacing:2px;color:var(--val);}
.ph-ct   {font-size:11px;color:var(--dim);letter-spacing:1px;}
#taskArea{flex:1;overflow:hidden;}
#taskArea.single{overflow-y:auto;padding:0 16px 80px;}
#taskArea.split {display:flex;overflow:hidden;}

/* ── Split columns ── */
.split-l{overflow-y:auto;height:100%;padding:0 8px 80px 16px;word-break:break-word;overflow-wrap:break-word;}
.split-div{width:5px;background:var(--border);cursor:col-resize;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;position:relative;transition:background .15s;}
.split-div:hover,.split-div.drag{background:var(--border2);}
.split-div::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:1px;height:26px;background:var(--border2);border-radius:999px;}
.split-r{flex:1;overflow-y:auto;height:100%;padding:0 16px 80px 8px;min-width:0;}

/* ═══════════════════════════════════════
   FLOATING SQUIRCLE NAV BUTTON
═══════════════════════════════════════ */
#fab-next{
  position:fixed;
  bottom:22px;right:22px;
  width:64px;height:64px;
  border-radius:18px;           /* squircle — iOS-style */
  border:none;
  cursor:pointer;touch-action:manipulation;
  font-family:inherit;font-size:22px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  z-index:800;
  transition:background .2s,box-shadow .2s,opacity .2s,transform .15s;
  -webkit-user-select:none;user-select:none;
}
#fab-next.hidden{display:none;}
/* disabled state — tab not complete */
#fab-next.off{
  background:var(--bg4);
  color:var(--dim);
  border:1.5px solid var(--border);
  box-shadow:none;
  opacity:.55;
}
/* active state — tab 100% done */
#fab-next.on{
  background:var(--accent);
  color:#fff;
  box-shadow:0 4px 20px rgba(56,189,248,.35);
  animation:squircle-pulse 2.5s ease-in-out infinite;
}
#fab-next.on:active{transform:scale(.92);}
/* arrow SVG inside */
#fab-next svg{width:28px;height:28px;display:block;pointer-events:none;}

/* ═══════════════════════════════════════
   LEFT COLUMN — EXTRAS
═══════════════════════════════════════ */
.ext-sec{margin-bottom:12px;margin-top:10px;}
.ext-sec-hdr{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.ext-sec-title{font-size:9px;font-weight:700;letter-spacing:3px;color:var(--accent);white-space:nowrap;}
.ext-sec-ct{font-size:9px;color:var(--dim);white-space:nowrap;}
.ext-sec-line{flex:1;height:1px;background:var(--border);}

.ext-item{display:flex;align-items:center;gap:10px;
  background:var(--ext-bg);border:1px solid var(--border);border-radius:9px;
  padding:14px 12px;margin-bottom:5px;
  cursor:pointer;touch-action:manipulation;position:relative;
  transition:background .1s,border-color .15s;-webkit-user-select:none;user-select:none;
  box-shadow:var(--shadow);}
.ext-item:active,.ext-item.press{filter:brightness(.95);}
.ext-item.done{background:var(--done-bg);border-color:var(--done-br);}
.ext-item.anim-done{animation:glow-done .5s ease-out forwards;}
.ext-dh{color:var(--dim);font-size:11px;cursor:grab;flex-shrink:0;touch-action:none;
  -webkit-user-select:none;user-select:none;padding:2px 4px 2px 0;letter-spacing:-2px;line-height:1;}
.ext-dh:active{cursor:grabbing;color:var(--accent);}
.ext-icon{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;flex-shrink:0;pointer-events:none;transition:background .1s;}
.ext-icon.pend{background:var(--border2);color:var(--accent);}
.ext-icon.done{background:var(--green);color:#fff;}
.ext-lbl-w{flex:1;min-width:0;pointer-events:none;}
.ext-lbl{font-size:12px;font-weight:600;letter-spacing:.3px;color:var(--txt);display:block;}
.ext-item.done .ext-lbl{color:var(--green);}
.ext-ts{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--done-br);display:none;margin-top:2px;}
.ext-item.done .ext-ts{display:block;color:var(--green);}

/* issue-capable */
.ext-ic{background:var(--ext-bg);border:1px solid var(--border);border-radius:9px;
  padding:12px;margin-bottom:5px;transition:background .1s,border-color .15s;
  position:relative;box-shadow:var(--shadow);}
.ext-ic.done {background:var(--done-bg);border-color:var(--done-br);}
.ext-ic.issue{background:var(--iss-bg);border-color:var(--iss-br);}
.ext-ic.anim-done{animation:glow-done .5s ease-out forwards;}
.ext-ic-top{display:flex;align-items:center;gap:8px;}

.ext-ic-icon.done {background:var(--green);color:#fff;}

  touch-action:none;-webkit-user-select:none;user-select:none;letter-spacing:-3px;line-height:1;transition:color .12s;}

.tr-dh:active{cursor:grabbing;color:var(--accent);}
.tr-main{display:flex;align-items:center;gap:10px;flex:1;min-width:0;

.tr-icon.pend {background:var(--border2);color:var(--accent);}
.tr-icon.done {background:var(--green);color:#fff;}
.tr-icon.issue{background:var(--orange);color:#fff;}

function applyTheme(t){

  try{localStorage.setItem('scc_theme',t);}catch(e){}
}
function toggleTheme(){applyTheme(_theme==='dark'?'light':'dark');}
function initTheme(){var s=null;try{s=localStorage.getItem('scc_theme');}catch(e){}applyTheme(s||detectSysTheme());}
document.getElementById('theme-btn-setup').addEventListener('click',toggleTheme);

function pad(n){return String(n).padStart(2,'0');}
function todayDMY(){var d=new Date();return pad(d.getDate())+'-'+pad(d.getMonth()+1)+'-'+d.getFullYear();}
function nowHHMM(){var d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes());}
function msToHHMM(ms){var d=new Date(ms);return pad(d.getHours())+':'+pad(d.getMinutes());}
function msDurMin(s,e){return Math.round((e-s)/60000);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function flash(el,cls){if(!el)return;el.classList.remove(cls);void el.offsetWidth;el.classList.add(cls);setTimeout(function(){el.classList.remove(cls);},600);}

   CLOCK
════════════════════ */
var _clockUTC=true,_clockInt=null;
function startClock(){if(_clockInt)clearInterval(_clockInt);_clockInt=setInterval(tickClock,500);tickClock();}
function tickClock(){
  var d=new Date();
  var hh=_clockUTC?pad(d.getUTCHours()):pad(d.getHours());
  var mm=_clockUTC?pad(d.getUTCMinutes()):pad(d.getMinutes());
  var ss=_clockUTC?pad(d.getUTCSeconds()):pad(d.getSeconds());
  var dig=document.getElementById('hclock-digits'),mode=document.getElementById('hclock-mode');
  if(dig)dig.textContent=hh+':'+mm+':'+ss;
  if(mode){mode.textContent=_clockUTC?'UTC':'LOC';mode.className='hclock-mode '+(_clockUTC?'utc':'loc');}
  updateETDiff();
}
document.getElementById('hclock').addEventListener('click',function(){_clockUTC=!_clockUTC;tickClock();});

/* ════════════════════
   ETD DIFF (always UTC)
════════════════════ */
function updateETDiff(){
  if(!state||!state.flightInfo.etd)return;
  var parts=state.flightInfo.etd.split(':');if(parts.length!==2)return;
  var now=new Date();
  var etdUTC=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate(),parseInt(parts[0],10),parseInt(parts[1],10),0));
  var diffSec=Math.round((etdUTC-now)/1000);
  var ab=Math.abs(diffSec),mm=Math.floor(ab/60),ss=ab%60;
  var el=document.getElementById('h-etd-val');if(!el)return;
  el.textContent=(diffSec>=0?'-':'+')+pad(mm)+':'+pad(ss);
  el.className='h-etd-val '+(diffSec>=0?'ahead':'late');
}
function updateETDBlock(){var b=document.getElementById('h-etd-block');if(b)b.classList.toggle('show',!!(state&&state.flightInfo.etd));}

var _bwInt=null;
function bwRender(){
  var b=state.boarding;
  var te=document.getElementById('bw-timer'),btn=document.getElementById('btn-bw');
  var sE=document.getElementById('bw-start'),eE=document.getElementById('bw-end'),dE=document.getElementById('bw-dur');
  if(!te||!btn)return;
  if(b.running){var sec=Math.floor((Date.now()-b.startMs)/1000);te.textContent=pad(Math.floor(sec/60))+':'+pad(sec%60);te.className='bw-timer running';btn.innerHTML='&#9632; STOP BOARDING';btn.className='running';}
  else if(b.startMs&&b.endMs){te.textContent=msDurMin(b.startMs,b.endMs)+' MIN';te.className='bw-timer done';btn.innerHTML='&#8635; RESET BOARDING';btn.className='stopped';}
  else{te.textContent='00:00';te.className='bw-timer idle';btn.innerHTML='&#9654; START BOARDING';btn.className='idle';}
  sE.textContent=b.startMs?msToHHMM(b.startMs):'--:--';sE.className='bw-c-val'+(b.startMs?' ok':'');
  eE.textContent=b.endMs?msToHHMM(b.endMs):'--:--';eE.className='bw-c-val'+(b.endMs?' ok':'');
  dE.textContent=(b.startMs&&b.endMs)?msDurMin(b.startMs,b.endMs)+' MIN':'--';dE.className='bw-c-val'+((b.startMs&&b.endMs)?' ok':'');
}
function bwStartInterval(){if(_bwInt)clearInterval(_bwInt);_bwInt=setInterval(function(){if(!state.boarding.running){clearInterval(_bwInt);_bwInt=null;}bwRender();},1000);}
document.getElementById('btn-bw').addEventListener('click',function(){
  var b=state.boarding;
  if(b.running){b.endMs=Date.now();b.running=false;if(_bwInt){clearInterval(_bwInt);_bwInt=null;}}
  else if(b.startMs&&b.endMs){state.boarding={startMs:null,endMs:null,running:false};}
  else{b.startMs=Date.now();b.endMs=null;b.running=true;bwStartInterval();}
  save();bwRender();
});

var state=null;
function mkTasks(type){return DATA[type].tasks.map(function(t){return{id:t.id,ph:t.ph,desc:t.d,status:'Pending',notes:'',ts:null};});}
function mkExtras(type){
  var out=[],idx=0;
  [{ph:'PRE-FLIGHT',list:DATA[type].preflightDefs},{ph:'BOARDING',list:DATA[type].boardingDefs}]
  .forEach(function(pd){pd.list.forEach(function(s){s.items.forEach(function(it){out.push({id:type+'-ex-'+(idx++),ph:pd.ph,sec:s.s,label:it.l,ic:it.ic,status:'Pending',notes:'',ts:null});});});});
  return out;
}
function mkBriefing(){return BR_DEFS.map(function(d){return{id:d.id,label:d.label,req:d.req,status:'Pending',ts:null};});}
function makeNew(type){
  var tasks=mkTasks(type),extras=mkExtras(type);
  var po={},eo={},ct={};
  ['PRE-FLIGHT','BOARDING','POST-FLIGHT'].forEach(function(p){
    po[p]=tasks.filter(function(t){return t.ph===p;}).map(function(t){return'task:'+t.id;});
    eo[p]=extras.filter(function(e){return e.ph===p;}).map(function(e){return e.id;});
    ct[p]=[];
  });
  return{setupComplete:false,aircraftType:type,flightInfo:{date:'',fnum:'',dep:'',arr:'',etd:''},
    currentPhase:DATA[type].phases[0],phases:DATA[type].phases.slice(),tasks:tasks,extras:extras,
    briefing:mkBriefing(),customTasks:ct,phaseOrder:po,extraOrder:eo,ctIdCtr:0,splitLW:260,
    boarding:{startMs:null,endMs:null,running:false}};
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function loadState(){
  try{
    var r=localStorage.getItem(KEY);
    if(r){
      state=JSON.parse(r);
      if(!state.briefing)    state.briefing=mkBriefing();
      if(!state.customTasks) state.customTasks={};
      if(!state.phaseOrder)  state.phaseOrder={};
      if(!state.extraOrder)  state.extraOrder={};
      if(!state.ctIdCtr)     state.ctIdCtr=0;
      if(!state.splitLW)     state.splitLW=260;
      if(!state.boarding)    state.boarding={startMs:null,endMs:null,running:false};
      if(!state.flightInfo.etd)state.flightInfo.etd='';
      state.tasks.forEach(function(t){if(!t.desc)t.desc=t.description||'';if(t.ts===undefined)t.ts=t.completedAt||null;if(!t.ph)t.ph=t.phase||'';});
      state.extras.forEach(function(e){if(e.ts===undefined)e.ts=e.completedAt||null;if(e.ic===undefined)e.ic=e.issueCapable||false;if(!e.ph)e.ph=e.phase||'';if(!e.sec)e.sec=e.section||'';});
      state.briefing.forEach(function(b){if(b.ts===undefined)b.ts=b.completedAt||null;if(b.req===undefined)b.req=b.required||false;});
      state.phases=state.phases.filter(function(p){return p!=='RIEPILOGO ISSUES'&&p!=='IN-FLIGHT'&&p!=='DESCENT';});
      if(state.phases.indexOf(BR)<0)   state.phases.unshift(BR);
      if(state.phases.indexOf(RIEP)<0) state.phases.push(RIEP);
      ['PRE-FLIGHT','BOARDING','POST-FLIGHT'].forEach(function(p){
        if(!state.customTasks[p])state.customTasks[p]=[];
        if(!state.phaseOrder[p]) state.phaseOrder[p]=bPO(p);
        if(!state.extraOrder[p]) state.extraOrder[p]=byExPh(p).map(function(e){return e.id;});
      });
      return;
    }
  }catch(e){}
  state=makeNew('737');
}

/* ════════════════════
   HELPERS
════════════════════ */
function byPh(p){return state.tasks.filter(function(t){return t.ph===p;});}
function taskById(id){for(var i=0;i<state.tasks.length;i++){if(state.tasks[i].id===id)return state.tasks[i];}return null;}
function byExPh(p){return state.extras.filter(function(e){return e.ph===p;});}
function exById(id){for(var i=0;i<state.extras.length;i++){if(state.extras[i].id===id)return state.extras[i];}return null;}
function getCT(ph){if(!state.customTasks[ph])state.customTasks[ph]=[];return state.customTasks[ph];}
function getCTById(ph,id){return getCT(ph).find(function(c){return c.id===id;})||null;}
function exDone(e){return e.ic?(e.status!=='Pending'):(e.status==='Done');}
function getPO(ph){if(!state.phaseOrder[ph])state.phaseOrder[ph]=bPO(ph);return state.phaseOrder[ph];}
function bPO(ph){var o=byPh(ph).map(function(t){return'task:'+t.id;});getCT(ph).forEach(function(c){o.push('custom:'+c.id);});return o;}
function getEO(ph){if(!state.extraOrder[ph])state.extraOrder[ph]=byExPh(ph).map(function(e){return e.id;});return state.extraOrder[ph];}
function getOrderedItems(ph){
  var order=getPO(ph),inO={};order.forEach(function(k){inO[k]=true;});
  var res=[];
  order.forEach(function(k){if(k.indexOf('task:')==0){var t=taskById(k.slice(5));if(t)res.push({type:'task',data:t,key:k});}else{var c=getCTById(ph,k.slice(7));if(c)res.push({type:'custom',data:c,key:k});}});
  byPh(ph).forEach(function(t){var k='task:'+t.id;if(!inO[k]){res.push({type:'task',data:t,key:k});order.push(k);}});
  getCT(ph).forEach(function(c){var k='custom:'+c.id;if(!inO[k]){res.push({type:'custom',data:c,key:k});order.push(k);}});
  return res;
}
function getOrderedExtras(ph){
  var order=getEO(ph),inO={};order.forEach(function(id){inO[id]=true;});
  var res=[];order.forEach(function(id){var e=exById(id);if(e)res.push(e);});
  byExPh(ph).forEach(function(e){if(!inO[e.id]){res.push(e);order.push(e.id);}});
  return res;
}

/* ════════════════════
   COUNTERS & PHASE LOGIC
════════════════════ */
function countIss(){var n=0;state.tasks.forEach(function(t){if(t.status==='Issue')n++;});state.extras.forEach(function(e){if(e.ic&&e.status==='Issue')n++;});for(var p in state.customTasks)getCT(p).forEach(function(c){if(c.status==='Issue')n++;});return n;}
function phasePct(p){
  if(p===RIEP)return-1;
  if(p===BR){var d=0,t=state.briefing.length;state.briefing.forEach(function(b){if(b.status==='Done')d++;});getCT(p).forEach(function(c){t++;if(c.status==='Done')d++;});return t>0?Math.round(d/t*100):0;}
  var d=0,t=0;byPh(p).forEach(function(x){t++;if(x.status!=='Pending')d++;});byExPh(p).forEach(function(e){t++;if(exDone(e))d++;});getCT(p).forEach(function(c){t++;if(c.status==='Done')d++;});return t>0?Math.round(d/t*100):0;
}
function brReqClear(){return state.briefing.every(function(b){return !b.req||b.status==='Done';});}
function phaseAllClear(p){
  if(p===RIEP)return true;
  if(p===BR)  return brReqClear();
  if(byPh(p).some(function(t){return t.status==='Pending';}))return false;
  if(byExPh(p).some(function(e){return e.ic?e.status==='Pending':e.status!=='Done';}))return false;
  if(getCT(p).some(function(c){return c.status==='Pending';}))return false;
  return true;
}

/* ════════════════════
   FLOATING SQUIRCLE FAB
════════════════════ */
function updateFAB(){
  var fab=document.getElementById('fab-next');
  if(!fab)return;
  var p=state&&state.currentPhase;
  /* hide on setup, on riepilogo, or last phase */
  if(!state||!state.setupComplete||p===RIEP){fab.className='hidden off';return;}
  var idx=state.phases.indexOf(p);
  if(idx>=state.phases.length-1){fab.className='hidden off';return;}
  fab.classList.remove('hidden');
  /* Briefing Room: activate when all REQUIRED items are done (optional don't block) */
  /* All other tabs: activate only at 100% completion */
  var isReady = (p===BR) ? brReqClear() : (phasePct(p)===100);
  fab.className = isReady ? 'on' : 'off';
}
document.getElementById('fab-next').addEventListener('click',function(){
  if(this.classList.contains('off'))return;/* disabled — ignore tap */
  var idx=state.phases.indexOf(state.currentPhase);
  if(idx>=state.phases.length-1)return;
  state.currentPhase=state.phases[idx+1];
  renderChecklist();scrollTop();updateBoardingBar();updateFAB();
});

function isDateOk(s){return /^\d{2}-\d{2}-\d{4}$/.test(s);}
function isEtdOk(s){return !s||/^\d{2}:\d{2}$/.test(s);}
function validateSetup(){
  var d=document.getElementById('s-date').value.trim();
  var f=document.getElementById('s-fnum').value.trim();
  var dep=document.getElementById('s-dep').value.trim();
  var arr=document.getElementById('s-arr').value.trim();
  var ac=document.getElementById('s-ac').value;
  var etd=document.getElementById('s-etd').value.trim();
  document.getElementById('btn-avvia').disabled=!(isDateOk(d)&&f.length>=2&&dep.length>=2&&arr.length>=2&&ac&&isEtdOk(etd));
  ['s-date','s-fnum','s-dep','s-arr'].forEach(function(id){var el=document.getElementById(id);el.classList.toggle('ok',id==='s-date'?isDateOk(el.value.trim()):!!el.value.trim());});
  document.getElementById('s-ac').classList.toggle('ok',!!document.getElementById('s-ac').value);
}
function fillSetup(){
  document.getElementById('s-date').value=state.flightInfo.date||todayDMY();
  document.getElementById('s-fnum').value=state.flightInfo.fnum||'';
  document.getElementById('s-dep').value=state.flightInfo.dep||'';
  document.getElementById('s-arr').value=state.flightInfo.arr||'';
  document.getElementById('s-ac').value=state.aircraftType||'';
  document.getElementById('s-etd').value=state.flightInfo.etd||'';
  validateSetup();
}
document.getElementById('s-date').addEventListener('input',function(){var raw=this.value.replace(/\D/g,'').slice(0,8),out='';if(raw.length>0)out=raw.slice(0,2);if(raw.length>2)out+='-'+raw.slice(2,4);if(raw.length>4)out+='-'+raw.slice(4,8);this.value=out;validateSetup();});
document.getElementById('s-etd').addEventListener('input',function(){var raw=this.value.replace(/\D/g,'').slice(0,4),out='';if(raw.length>0)out=raw.slice(0,2);if(raw.length>2)out+=':'+raw.slice(2,4);this.value=out;validateSetup();});

['s-dep','s-arr'].forEach(function(id){document.getElementById(id).addEventListener('input',function(){this.value=this.value.toUpperCase();validateSetup();});});

    +'</div></div>';

    +'<div class="rp-cell"><div class="rp-cell-lbl">INIZIO</div><div class="rp-cell-val '+(hasS?'ok':'miss')+'">'+sStr+'</div></div>'
    +'<div class="rp-cell"><div class="rp-cell-lbl">FINE</div><div class="rp-cell-val '+(hasE?'ok':'miss')+'">'+eStr+'</div></div>'
    +'<div class="rp-cell"><div class="rp-cell-lbl">DURATA</div><div class="rp-cell-val '+(hasS&&hasE?'ok':'miss')+'">'+dStr+'</div></div>'
    +'</div></div>';
  if(fi.etd){
    var parts=fi.etd.split(':'),now=new Date();
    var etdUTC=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate(),parseInt(parts[0],10),parseInt(parts[1],10),0));
    var refMs=hasE?b.endMs:now.getTime(),diffSec=Math.round((etdUTC-refMs)/1000);
    var ab=Math.abs(diffSec),mm=Math.floor(ab/60),ss=ab%60;
    html+='<div class="rp-section"><div class="rp-sec-hdr"><span class="rp-sec-title">DELTA ETD (UTC)</span><div class="rp-sec-line"></div></div><div class="rp-grid-2">'
      +'<div class="rp-cell"><div class="rp-cell-lbl">ETD</div><div class="rp-cell-val">'+esc(fi.etd)+' UTC</div></div>'
      +'<div class="rp-cell"><div class="rp-cell-lbl">'+(diffSec>=0?'ANTICIPO':'RITARDO')+'</div><div class="rp-cell-val '+(diffSec>=0?'ok':'late')+'">'+(diffSec>=0?'-':'+')+pad(mm)+':'+pad(ss)+'</div></div>'

    ['PRE-FLIGHT','BOARDING','POST-FLIGHT'].forEach(function(ph){

      if(list.length){

/* ════════════════════
   RESIZABLE DIVIDER
════════════════════ */
function initDivider(){
  var div=document.getElementById('split-div'),lc=document.getElementById('split-l');
  if(!div||!lc)return;
  var drag=false,sx=0,sw=0;
  function onS(e){drag=true;div.classList.add('drag');sx=e.touches?e.touches[0].clientX:e.clientX;sw=lc.offsetWidth;e.preventDefault();}
  function onM(e){if(!drag)return;var cx=e.touches?e.touches[0].clientX:e.clientX;var tw=document.getElementById('taskArea').offsetWidth;lc.style.width=Math.max(80,Math.min(tw-80,sw+(cx-sx)))+'px';_splitLW=lc.offsetWidth;}
  function onE(){drag=false;div.classList.remove('drag');}
  div.addEventListener('mousedown',onS);div.addEventListener('touchstart',onS,{passive:false});
  document.addEventListener('mousemove',onM);document.addEventListener('touchmove',onM,{passive:false});
  document.addEventListener('mouseup',onE);document.addEventListener('touchend',onE);
}

/* ════════════════════
   DRAG & DROP — RIGHT
════════════════════ */
var _rdd={on:false,ph:null,from:null,fromEl:null,tgt:null,before:true,pid:-1};
document.getElementById('taskArea').addEventListener('pointerdown',function(e){
  var h=e.target.closest('[data-dh]');if(!h)return;
  var row=h.closest('.task-row');if(!row)return;
  var ph=row.getAttribute('data-phase'),key=row.getAttribute('data-item-key');if(!ph||!key)return;
  e.preventDefault();
  _rdd.on=true;_rdd.ph=ph;_rdd.from=key;_rdd.fromEl=row;_rdd.pid=e.pointerId;
  row.classList.add('dd-drag');
  document.addEventListener('pointermove',_rddMv);document.addEventListener('pointerup',_rddEnd);document.addEventListener('pointercancel',_rddEnd);
},{passive:false});
function _rddMv(e){
  if(!_rdd.on||e.pointerId!==_rdd.pid)return;e.preventDefault();
  _rdd.fromEl.style.pointerEvents='none';var u=document.elementFromPoint(e.clientX,e.clientY);_rdd.fromEl.style.pointerEvents='';
  document.querySelectorAll('.task-row.dd-above,.task-row.dd-below').forEach(function(el){el.classList.remove('dd-above','dd-below');});
  var tgt=u?u.closest('.task-row'):null;
  if(tgt&&tgt!==_rdd.fromEl&&tgt.getAttribute('data-phase')===_rdd.ph){var r=tgt.getBoundingClientRect();_rdd.before=e.clientY<r.top+r.height/2;tgt.classList.add(_rdd.before?'dd-above':'dd-below');_rdd.tgt=tgt;}else _rdd.tgt=null;
}
function _rddEnd(){
  if(!_rdd.on)return;
  document.removeEventListener('pointermove',_rddMv);document.removeEventListener('pointerup',_rddEnd);document.removeEventListener('pointercancel',_rddEnd);
  document.querySelectorAll('.task-row.dd-above,.task-row.dd-below').forEach(function(el){el.classList.remove('dd-above','dd-below');});
  if(_rdd.tgt){var toKey=_rdd.tgt.getAttribute('data-item-key');if(toKey&&toKey!==_rdd.from){var o=getPO(_rdd.ph);var fi=o.indexOf(_rdd.from),ti=o.indexOf(toKey);if(fi>=0&&ti>=0){o.splice(fi,1);var ni=o.indexOf(toKey);if(!_rdd.before)ni++;o.splice(ni,0,_rdd.from);}}}
  _rdd.on=false;if(_rdd.fromEl)_rdd.fromEl.classList.remove('dd-drag');_rdd.fromEl=null;_rdd.tgt=null;
  renderKeepScroll();
}

/* ════════════════════
   DRAG & DROP — LEFT EXTRAS
════════════════════ */
var _edd={on:false,ph:null,from:null,fromEl:null,tgt:null,before:true,pid:-1};
document.getElementById('taskArea').addEventListener('pointerdown',function(e){
  var h=e.target.closest('[data-ext-dh]');if(!h)return;
  var row=h.closest('[data-ex-id]');if(!row)return;
  var exId=row.getAttribute('data-ex-id'),ph=row.getAttribute('data-ext-ph');if(!exId||!ph)return;
  e.preventDefault();
  _edd.on=true;_edd.ph=ph;_edd.from=exId;_edd.fromEl=row;_edd.pid=e.pointerId;
  row.style.opacity='.3';
  document.addEventListener('pointermove',_eddMv);document.addEventListener('pointerup',_eddEnd);document.addEventListener('pointercancel',_eddEnd);
},{passive:false});
function _eddMv(e){
  if(!_edd.on||e.pointerId!==_edd.pid)return;e.preventDefault();
  _edd.fromEl.style.pointerEvents='none';var u=document.elementFromPoint(e.clientX,e.clientY);_edd.fromEl.style.pointerEvents='';
  document.querySelectorAll('[data-ex-id].dd-above,[data-ex-id].dd-below').forEach(function(el){el.classList.remove('dd-above','dd-below');});
  var tgt=u?u.closest('[data-ex-id]'):null;
  if(tgt&&tgt!==_edd.fromEl&&tgt.getAttribute('data-ext-ph')===_edd.ph){var r=tgt.getBoundingClientRect();_edd.before=e.clientY<r.top+r.height/2;tgt.classList.add(_edd.before?'dd-above':'dd-below');_edd.tgt=tgt;}else _edd.tgt=null;
}
function _eddEnd(){
  if(!_edd.on)return;
  document.removeEventListener('pointermove',_eddMv);document.removeEventListener('pointerup',_eddEnd);document.removeEventListener('pointercancel',_eddEnd);
  document.querySelectorAll('[data-ex-id].dd-above,[data-ex-id].dd-below').forEach(function(el){el.classList.remove('dd-above','dd-below');});
  if(_edd.tgt){var toId=_edd.tgt.getAttribute('data-ex-id');if(toId&&toId!==_edd.from){var o=getEO(_edd.ph);var fi=o.indexOf(_edd.from),ti=o.indexOf(toId);if(fi>=0&&ti>=0){o.splice(fi,1);var ni=o.indexOf(toId);if(!_edd.before)ni++;o.splice(ni,0,_edd.from);}}}
  _edd.on=false;if(_edd.fromEl)_edd.fromEl.style.opacity='';_edd.fromEl=null;_edd.tgt=null;
  renderKeepScroll();
}

/* ════════════════════
   ACTIONS
════════════════════ */
function setDone(obj,done){obj.status=done?'Done':'Pending';obj.ts=done?nowHHMM():null;}
function togExtra(id){var e=exById(id);if(!e)return;var nd=e.status!=='Done';setDone(e,nd);renderKeepScroll();if(nd){var el=document.querySelector('[data-ex-id="'+CSS.escape(id)+'"]');if(el)flash(el,'anim-done');}}
function issExtra(id){var e=exById(id);if(!e)return;e.status=(e.status==='Issue')?'Pending':'Issue';if(e.status==='Issue')e.ts=null;var btn=document.querySelector('.ex-iss[data-id="'+CSS.escape(id)+'"]');if(btn&&e.status==='Issue')flash(btn,'anim-iss');renderKeepScroll();}
function togBriefing(id){var b=state.briefing.find(function(x){return x.id===id;});if(!b)return;var nd=b.status!=='Done';setDone(b,nd);renderKeepScroll();if(nd){var el=document.querySelector('[data-br-id="'+CSS.escape(id)+'"]');if(el)flash(el,'anim-done');}}
function togByKey(ph,key){
  var obj=null;
  if(key.indexOf('task:')==0)obj=taskById(key.slice(5));
  else if(key.indexOf('custom:')==0)obj=getCTById(ph,key.slice(7));
  if(!obj)return;var nd=obj.status!=='Done';setDone(obj,nd);
  renderKeepScroll();
  if(nd){var el=document.querySelector('[data-item-key="'+CSS.escape(key)+'"]');if(el)flash(el,'anim-done');}
}
function issByKey(ph,key){
  var obj=null;
  if(key.indexOf('task:')==0)obj=taskById(key.slice(5));
  else if(key.indexOf('custom:')==0)obj=getCTById(ph,key.slice(7));
  if(!obj)return;obj.status=(obj.status==='Issue')?'Pending':'Issue';if(obj.status==='Issue')obj.ts=null;
  var btn=document.querySelector('.tr-iss[data-iss-key="'+CSS.escape(key)+'"]');if(btn&&obj.status==='Issue')flash(btn,'anim-iss');
  renderKeepScroll();
}
function setNote(ph,key,val){var obj=null;if(key.indexOf('task:')==0)obj=taskById(key.slice(5));else if(key.indexOf('custom:')==0)obj=getCTById(ph,key.slice(7));if(obj)obj.notes=val;save();}
function addCT(ph){showInput('INSERISCI VOCE','',false,function(txt){if(!state.ctIdCtr)state.ctIdCtr=0;state.ctIdCtr++;var id='ct-'+state.ctIdCtr;getCT(ph).push({id:id,desc:txt,status:'Pending',notes:'',ts:null});getPO(ph).push('custom:'+id);renderKeepScroll();});}
function editCT(ph,ctId){var c=getCTById(ph,ctId);if(!c)return;showInput('MODIFICA VOCE',c.desc,true,function(txt){c.desc=txt;renderKeepScroll();});}
function delCT(ph,ctId){showModal('ELIMINARE QUESTA VOCE?',true,function(ok){if(!ok)return;var o=getPO(ph),k='custom:'+ctId,i=o.indexOf(k);if(i>=0)o.splice(i,1);var ct=getCT(ph),j=ct.findIndex(function(c){return c.id===ctId;});if(j>=0)ct.splice(j,1);renderKeepScroll();});}

/* ════════════════════
   HEADER BUTTONS
════════════════════ */
document.getElementById('btn-mod').addEventListener('click',function(){state.setupComplete=false;save();fillSetup();showScreen('screen-setup');updateFAB();});
document.getElementById('hdr-r2').addEventListener('click',function(e){
  var el=e.target;while(el&&el!==this){if(el.classList.contains('ptab')){state.currentPhase=el.getAttribute('data-phase');renderChecklist();scrollTop();updateBoardingBar();return;}el=el.parentElement;}
});
function scrollTop(){var sl=document.getElementById('split-l'),sr=document.getElementById('split-r'),ta=document.getElementById('taskArea');if(sl)sl.scrollTop=0;if(sr)sr.scrollTop=0;if(ta)ta.scrollTop=0;}

/* ════════════════════
   TASK AREA DELEGATION
════════════════════ */
document.getElementById('taskArea').addEventListener('click',function(e){
  var el=e.target;
  while(el&&el!==this){
    if(el.hasAttribute('data-dh')||el.hasAttribute('data-ext-dh'))return;
    // Briefing
    if(el.classList.contains('br-item')){
      if(el.classList.contains('cact'))break;
      if(el.hasAttribute('data-br-id')){var bid=el.getAttribute('data-br-id');setTimeout(function(){togBriefing(bid);},40);return;}
      if(el.hasAttribute('data-br-ct')){var cid=el.getAttribute('data-br-ct');var c=getCTById(BR,cid);if(c){var nd=c.status!=='Done';setDone(c,nd);if(nd)flash(el,'anim-done');renderKeepScroll();}return;}
    }
    if(el.classList.contains('br-ct-edit')){editCT(BR,el.getAttribute('data-ct-id'));return;}
    if(el.classList.contains('br-ct-del')){delCT(BR,el.getAttribute('data-ct-id'));return;}
    // Left
    if(el.classList.contains('ext-item')&&el.hasAttribute('data-ex-id')){var exid=el.getAttribute('data-ex-id');setTimeout(function(){togExtra(exid);},40);return;}
    if(el.hasAttribute('data-ex-tog')||el.classList.contains('ext-ic-main')){var tid=el.getAttribute('data-ex-tog')||(el.closest('[data-ex-id]')||{}).getAttribute('data-ex-id');if(tid)togExtra(tid);return;}
    if(el.classList.contains('ex-iss')){issExtra(el.getAttribute('data-id'));return;}
    // Right
    if(el.classList.contains('tr-main')){var k=el.getAttribute('data-tog-key'),p=el.getAttribute('data-tog-ph');setTimeout(function(){togByKey(p,k);},40);return;}
    if(el.classList.contains('tr-iss')) {issByKey(el.getAttribute('data-iss-ph'),el.getAttribute('data-iss-key'));return;}
    if(el.classList.contains('tr-edit')){editCT(el.getAttribute('data-ph'),el.getAttribute('data-key').slice(7));return;}
    if(el.classList.contains('tr-del')) {delCT(el.getAttribute('data-ph'),el.getAttribute('data-key').slice(7));return;}
    if(el.classList.contains('add-custom-btn')){addCT(el.getAttribute('data-add-ph'));return;}
    el=el.parentElement;
  }
});
document.getElementById('taskArea').addEventListener('input',function(e){
  var el=e.target,v=el.value.toUpperCase();el.value=v;
  if(el.classList.contains('tr-nt'))setNote(el.getAttribute('data-ph'),el.getAttribute('data-key'),v);
  if(el.classList.contains('ex-nt')){var ex=exById(el.getAttribute('data-id'));if(ex)ex.notes=v;save();}
});

/* ════════════════════
   BOOT
════════════════════ */
initTheme();
loadState();
if(state.setupComplete){
  renderChecklist();showScreen('screen-checklist');
  bwRender();updateBoardingBar();
  if(state.boarding.running)bwStartInterval();
  startClock();updateETDBlock();updateFAB();
} else {
  fillSetup();showScreen('screen-setup');
}
</script>
</body>
